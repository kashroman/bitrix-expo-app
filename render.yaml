services:
  - type: web
    name: calendar-interpro-app
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: BITRIX_PORTAL
        value: b24-5syfa7.bitrix24.ru
      - key: BITRIX_UF_ENTITY_ID
        value: CRM_8
      - key: APP_BASE_URL
        value: https://calendar-interpro-app.onrender.com
      - key: PARSE_RATE_LIMIT_MS
        value: 1000
      - key: CRON_REPORT_CHANNEL
        value: personal
      - key: OWNER_USER_ID
        value: 1
      # Set these in the Render dashboard (do not commit secrets).
      - key: BITRIX_WEBHOOK_URL
        sync: false
      - key: BITRIX_CLIENT_ID
        sync: false
      - key: BITRIX_CLIENT_SECRET
        sync: false

  # Mondays at 06:00 UTC. Adjust as needed.
  - type: cron
    name: weekly-check
    schedule: "0 6 * * 1"
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npx tsx server/cron/weekly-check.ts
    envVars:
      - key: BITRIX_WEBHOOK_URL
        sync: false
      - key: BITRIX_UF_ENTITY_ID
        value: CRM_8
      - key: PARSE_RATE_LIMIT_MS
        value: 1500
      - key: OWNER_USER_ID
        value: 1
      - key: CRON_REPORT_CHANNEL
        value: personal
      - key: CRON_REPORT_CHAT_ID
        sync: false
