# Manual Yandex Cloud Serverless Container deploy.
#
# This workflow is intentionally gated on `workflow_dispatch` so it never
# runs automatically. The existing Render auto-deploy is unaffected.
#
# Required repo secrets (add only when ready to cut over to Yandex Cloud):
#   - YC_SA_JSON_CREDENTIALS : service-account key JSON
#   - YC_REGISTRY_ID         : Yandex Container Registry id
#   - YC_CONTAINER_NAME      : Serverless Container name (e.g. bitrix-expo-app)
#   - YC_SA_ID               : service-account id used to run the container
#
# Runtime application secrets (BITRIX_WEBHOOK_URL, ADMIN_JOB_TOKEN,
# CRON_REPORT_CHAT_ID, …) live in the Yandex Cloud console / Lockbox and
# are NEVER referenced by this workflow.

name: deploy-yandex (manual)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag (defaults to the commit SHA)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Hard guard: refuse to run unless the YC secrets are present.
    # Prevents accidental enablement before secrets are configured.
    if: ${{ vars.YC_DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node (for sanity check only — image builds run inside Docker)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install & test (fail fast before pushing an image)
        run: |
          npm ci
          npm run check
          npm test

      - name: Install yc CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i "$HOME/yandex-cloud" -n
          echo "$HOME/yandex-cloud/bin" >> "$GITHUB_PATH"

      - name: Authenticate yc CLI
        env:
          YC_SA_JSON_CREDENTIALS: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
        run: |
          umask 077
          printf '%s' "$YC_SA_JSON_CREDENTIALS" > /tmp/sa-key.json
          yc config set service-account-key /tmp/sa-key.json
          yc config set format json

      - name: Configure Docker for Yandex CR
        run: yc container registry configure-docker

      - name: Build & push image
        env:
          REGISTRY_ID: ${{ secrets.YC_REGISTRY_ID }}
          NAME:        ${{ secrets.YC_CONTAINER_NAME }}
          TAG:         ${{ steps.tag.outputs.tag }}
        run: |
          IMAGE="cr.yandex/${REGISTRY_ID}/${NAME}:${TAG}"
          docker build -t "$IMAGE" .
          docker push        "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy new revision
        env:
          NAME:  ${{ secrets.YC_CONTAINER_NAME }}
          SA_ID: ${{ secrets.YC_SA_ID }}
        run: |
          # Only non-secret env vars are passed here. Application secrets
          # (BITRIX_WEBHOOK_URL, ADMIN_JOB_TOKEN, …) MUST stay in the
          # Yandex Cloud console / Lockbox.
          yc serverless container revision deploy \
            --container-name "$NAME" \
            --image "$IMAGE" \
            --cores 1 \
            --memory 512MB \
            --concurrency 8 \
            --execution-timeout 60s \
            --service-account-id "$SA_ID" \
            --environment NODE_ENV=production \
            --environment BITRIX_PORTAL=b24-5syfa7.bitrix24.ru \
            --environment BITRIX_UF_ENTITY_ID=CRM_8 \
            --environment PARSE_RATE_LIMIT_MS=1000 \
            --environment CRON_REPORT_CHANNEL=personal \
            --environment OWNER_USER_ID=1

      - name: Smoke-test /health
        run: |
          URL=$(yc serverless container get "${{ secrets.YC_CONTAINER_NAME }}" | jq -r .url)
          echo "Container URL: $URL"
          curl -fsS --retry 5 --retry-delay 3 --retry-connrefused "$URL/health"

      - name: Clean up key material
        if: always()
        run: rm -f /tmp/sa-key.json
